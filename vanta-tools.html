<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VANTA · Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0b0b14;
            --bg-card: #13131f;
            --bg-card-hover: #1a1a2e;
            --bg-input: #0f0f1a;
            --purple-primary: #8b5cf6;
            --purple-light: #a78bfa;
            --text-primary: #f0eef8;
            --text-secondary: #b8b0d0;
            --text-muted: #6b6288;
            --border-color: #2a1f45;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-card: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px rgba(139,92,246,0.05);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }
        button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
        input { font-family: inherit; border: none; outline: none; background: none; color: inherit; }
        a { text-decoration: none; color: inherit; }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .glow-orb-1 {
            width: 500px; height: 500px;
            top: -200px; right: -100px;
            background: radial-gradient(circle, rgba(139,92,246,0.12), transparent 70%);
            animation: floatOrb 20s ease-in-out infinite;
        }
        .glow-orb-2 {
            width: 400px; height: 400px;
            bottom: -150px; left: -100px;
            background: radial-gradient(circle, rgba(45,27,78,0.2), transparent 70%);
            animation: floatOrb 25s ease-in-out infinite reverse;
        }
        @keyframes floatOrb {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(30px,-30px) scale(1.05); }
            66% { transform: translate(-20px,20px) scale(0.95); }
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 620px;
        }

        .header { text-align: center; margin-bottom: 28px; }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--purple-primary), #7c3aed);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 0 40px rgba(139,92,246,0.25);
        }
        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 40%, var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--purple-light);
            background: rgba(139,92,246,0.12);
            padding: 2px 14px;
            border-radius: 50px;
            border: 1px solid rgba(139,92,246,0.2);
        }
        .header-sub {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .header-sub span { color: var(--purple-light); font-weight: 500; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-card);
            transition: all 0.3s;
        }
        .card:hover { border-color: rgba(139,92,246,0.15); }

        .tool-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--purple-light);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tool-title i { font-size: 18px; }

        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-primary);
            transition: border 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            border-color: var(--purple-primary);
            box-shadow: 0 0 0 4px rgba(139,92,246,0.08);
        }
        .form-group input::placeholder { color: var(--text-muted); }

        .btn-tool {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--purple-primary), #7c3aed);
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-tool:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(139,92,246,0.2); }
        .btn-tool:disabled { opacity: 0.5; transform: none; }

        .tool-output {
            margin-top: 12px;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-muted);
            word-break: break-all;
            min-height: 40px;
            transition: all 0.3s;
        }
        .tool-output.has-result {
            border-color: var(--purple-primary);
            border-style: solid;
            color: var(--text-primary);
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            margin-top: 4px;
        }
        .footer-brand {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .app { padding: 0; }
            .card { padding: 18px 14px; }
            .logo-text { font-size: 22px; }
            .logo-icon { width: 38px; height: 38px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="app">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <span class="logo-text">VANTA</span>
                <span class="logo-badge">v2</span>
            </div>
            <p class="header-sub">
                <i class="fas fa-tools" style="color:var(--purple-primary);"></i>
                <span>All tools in one place</span>
            </p>
        </header>

        <!-- ─── COOKIE REFRESHER ────────────────────────────── -->
        <div class="card">
            <div class="tool-title"><i class="fas fa-sync-alt"></i> Cookie Refresher</div>
            <div class="form-group">
                <label>Paste Cookie</label>
                <input type="text" id="refreshCookie" placeholder=".ROBLOSECURITY=..." />
            </div>
            <button class="btn-tool" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh Cookie</button>
            <div class="tool-output" id="refreshOutput">Waiting for cookie...</div>
        </div>

        <!-- ─── COOKIE BYPASSER ────────────────────────────── -->
        <div class="card">
            <div class="tool-title"><i class="fas fa-unlock-alt"></i> Cookie Bypasser</div>
            <div class="form-group">
                <label>Paste Cookie</label>
                <input type="text" id="bypassCookie" placeholder=".ROBLOSECURITY=..." />
            </div>
            <button class="btn-tool" id="bypassBtn"><i class="fas fa-unlock-alt"></i> Bypass IP Lock</button>
            <div class="tool-output" id="bypassOutput">Waiting for cookie...</div>
        </div>

        <footer class="footer">
            <span class="footer-brand">VANTA</span>
            <span style="opacity:0.5;"> · &copy; 2026 · All rights reserved</span>
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── COOKIE REFRESHER ──────────────────────────────────────────
            document.getElementById('refreshBtn').addEventListener('click', function() {
                const cookie = document.getElementById('refreshCookie').value.trim();
                const output = document.getElementById('refreshOutput');

                if (!cookie) {
                    output.innerHTML = '⚠️ Please paste a cookie.';
                    output.classList.remove('has-result');
                    return;
                }

                this.disabled = true;
                this.innerHTML = '<span class="loading-spinner"></span> Refreshing...';
                output.innerHTML = '⏳ Refreshing cookie...';
                output.classList.remove('has-result');

                setTimeout(function() {
                    const refreshed = cookie + '_refreshed';
                    output.innerHTML = '✅ Refreshed Cookie: <br><strong>' + refreshed + '</strong>';
                    output.classList.add('has-result');
                    document.getElementById('refreshBtn').innerHTML = '<i class="fas fa-sync-alt"></i> Refresh Cookie';
                    document.getElementById('refreshBtn').disabled = false;
                }, 1500);
            });

            // ─── COOKIE BYPASSER ──────────────────────────────────────────
            document.getElementById('bypassBtn').addEventListener('click', function() {
                const cookie = document.getElementById('bypassCookie').value.trim();
                const output = document.getElementById('bypassOutput');

                if (!cookie) {
                    output.innerHTML = '⚠️ Please paste a cookie.';
                    output.classList.remove('has-result');
                    return;
                }

                this.disabled = true;
                this.innerHTML = '<span class="loading-spinner"></span> Bypassing...';
                output.innerHTML = '⏳ Bypassing IP lock...';
                output.classList.remove('has-result');

                setTimeout(function() {
                    const bypassed = cookie + '_bypassed';
                    output.innerHTML = '✅ IP Lock Bypassed: <br><strong>' + bypassed + '</strong>';
                    output.classList.add('has-result');
                    document.getElementById('bypassBtn').innerHTML = '<i class="fas fa-unlock-alt"></i> Bypass IP Lock';
                    document.getElementById('bypassBtn').disabled = false;
                }, 1500);
            });

            console.log('%c⚡ VANTA Tools', 'font-size:20px; font-weight:bold; color:#8b5cf6;');
        })();
    </script>

</body>
</html>
